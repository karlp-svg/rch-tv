# Cloudflare Pages configuration
name = "rch-tv"
compatibility_date = "2024-01-01"

[build]
command = "npm run build"
publish = ".next"

# Environment variables (set these in Cloudflare dashboard)
# DATABASE_URL=your_supabase_connection_string
# DJ_CONSOLE_USERNAME=dj
# DJ_CONSOLE_PASSWORD=your_secure_password
# NEXT_PUBLIC_PUBLIC_APP_URL=https://rch-tv.pages.dev

# Caching rules for static assets
[[rules]]
type = "Static"
include = ["**/*.{jpg,jpeg,png,gif,svg,ico,webp}"]
cache = true
cache_ttl = 31536000

[[rules]]
type = "Static"
include = ["**/*.{js,css,woff,woff2}"]
cache = true
cache_ttl = 31536000

# API routes - shorter cache
[[rules]]
type = "Dynamic"
include = ["/api/*"]
cache = false
